<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="B:RASSäRIE – Schweizer Brass-Band für Events, Festivals und private Anlässe. Jetzt buchen!">

  <!-- Open Graph for Instagram / social preview -->
  <meta property="og:title" content="B:RASSäRIE">
  <meta property="og:description" content="Schweizer Brass-Band für Events, Festivals und private Anlässe.">
  <meta property="og:image" content="assets/images/logo.png">
  <meta property="og:type" content="website">

  <title>B:RASSäRIE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-black font-sans">

  <!-- ===== LOGO / HEADER ===== -->
  <header>
    <img src="assets/images/logo.png"
         alt="B:RASSäRIE Logo"
         class="w-full block">
  </header>

  <main>

    <!-- ===== CTA ===== -->
    <section class="flex justify-center py-10">
      <a href="#booking"
         class="bg-red-600 text-white font-bold px-10 py-3 rounded-full
                hover:bg-red-700 transition-colors text-lg">
        Jetzt buchen!
      </a>
    </section>

    <!-- ===== GIG CARDS ===== -->
    <section class="px-6 pb-12">
      <h2 class="text-sm font-bold uppercase tracking-widest mb-6">Kommende Auftritte</h2>
      <div id="gig-cards"
           class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- populated by js/gigs.js -->
      </div>
    </section>

    <!-- ===== MEMBER STRIP ===== -->
    <section id="member-strip"
             class="flex overflow-x-auto border-t border-black"
             aria-label="Bandmitglieder">
      <!-- populated in a later phase -->
    </section>

  </main>

  <!-- ===== BOOKING FORM (Phase C) ===== -->
  <section id="booking" class="border-t border-black p-8">
    <p class="text-sm text-gray-400">Buchungsformular folgt in Phase C.</p>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="border-t border-black px-8 py-5 flex items-center gap-6 text-xs">
    <a href="impressum.html" class="hover:text-red-600">Impressum</a>
    <a href="datenschutz.html" class="hover:text-red-600">Datenschutz</a>

    <!-- Instagram — inline SVG so currentColor works for red tint -->
    <a href="https://www.instagram.com/brassaerie"
       target="_blank"
       rel="noopener noreferrer"
       class="ml-auto text-red-600 hover:text-red-700 transition-colors"
       aria-label="B:RASSäRIE auf Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round"
           class="w-7 h-7" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/gigs.js"></script>

</body>
</html>
