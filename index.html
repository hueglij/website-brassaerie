<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="B:RASSäRIE – Schweizer Brass-Band für Events, Festivals und private Anlässe. Jetzt buchen!">

  <!-- Open Graph for Instagram / social preview -->
  <meta property="og:title" content="B:RASSäRIE">
  <meta property="og:description" content="Schweizer Brass-Band für Events, Festivals und private Anlässe.">
  <meta property="og:image" content="assets/images/logo.png">
  <meta property="og:type" content="website">

  <title>B:RASSäRIE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-black font-sans">

  <!--
    LAYOUT: two-column on desktop (lg+), single column on mobile.
    DOM order: aside first (= left column on desktop).
    On mobile: main gets order-1 (logo on top), aside gets order-2 (cards below).
  -->
  <div class="flex flex-col lg:flex-row min-h-screen">

    <!-- ===== LEFT COLUMN: gig cards + Instagram (desktop) ===== -->
    <aside class="order-2 lg:order-1
                  lg:w-72 lg:flex-shrink-0
                  lg:sticky lg:top-0 lg:h-screen lg:overflow-hidden
                  border-b lg:border-b-0 lg:border-r border-black
                  p-6 flex flex-col">

      <h2 class="text-xs font-bold uppercase tracking-widest mb-5">Kommende Auftritte</h2>

      <!-- Flip cards rendered by js/gigs.js -->
      <div id="gig-cards" class="flex-1 flex flex-col gap-4"></div>

      <!-- Instagram — centered at bottom of sidebar, desktop only -->
      <a href="https://www.instagram.com/brassaerie"
         target="_blank"
         rel="noopener noreferrer"
         class="mt-8 hidden lg:flex lg:justify-center text-red-600 hover:text-red-700 transition-colors"
         aria-label="B:RASSäRIE auf Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round"
             class="w-7 h-7" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
      </a>

    </aside>

    <!-- ===== RIGHT COLUMN: logo + CTA + member strip ===== -->
    <main class="order-1 lg:order-2 flex-1 flex flex-col">

      <!-- Logo spans the full width of the right column -->
      <header>
        <img src="assets/images/logo.png"
             alt="B:RASSäRIE Logo"
             class="w-full block">
      </header>

      <!-- CTA -->
      <section class="flex justify-center py-10">
        <a href="#" id="booking-trigger"
           class="bg-red-600 text-white font-bold px-10 py-3 rounded-full
                  hover:bg-red-700 transition-colors text-lg">
          Jetzt buchen!
        </a>
      </section>

      <!-- Member strip: 9 columns, instrument + portrait per member -->
      <section id="member-strip"
               class="flex overflow-x-auto border-t border-black mt-auto"
               aria-label="Bandmitglieder">
        <!-- populated in Phase B/C -->
      </section>

    </main>

  </div>

  <!-- ===== BOOKING MODAL ===== -->
  <div id="booking-modal"
       class="hidden fixed inset-0 z-50 overflow-y-auto"
       role="dialog" aria-modal="true" aria-labelledby="booking-title">

    <!-- Backdrop -->
    <div id="booking-backdrop" class="fixed inset-0 bg-black/60"></div>

    <!-- Scroll container — centers the panel, allows overflow on small screens -->
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="relative bg-white w-full max-w-2xl border border-black">

        <!-- Modal header -->
        <div class="flex items-center justify-between px-8 py-5 border-b border-black">
          <h2 id="booking-title" class="text-xs font-bold uppercase tracking-widest">Buchungsanfrage</h2>
          <button id="booking-close"
                  class="text-black hover:text-red-600 transition-colors text-2xl leading-none"
                  aria-label="Schliessen">&#x2715;</button>
        </div>

        <!-- Form -->
        <div class="px-8 py-8">
          <form action="https://api.web3forms.com/submit" method="POST" class="space-y-6">

            <!-- Web3Forms hidden fields — access_key filled in Phase G -->
            <input type="hidden" name="access_key" value="">
            <input type="hidden" name="subject" value="Neue Buchungsanfrage — B:RASSäRIE">
            <input type="hidden" name="from_name" value="B:RASSäRIE Buchungsformular">
            <!-- Honeypot: Web3Forms discards submissions where this is filled -->
            <input type="text" name="botcheck" tabindex="-1" autocomplete="off" style="display:none">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

              <div class="flex flex-col gap-1">
                <label for="organizerName" class="text-xs font-bold uppercase tracking-wider">Name / Organisation <span class="text-red-600">*</span></label>
                <input type="text" id="organizerName" name="organizerName" required
                       class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
              </div>

              <div class="flex flex-col gap-1">
                <label for="email" class="text-xs font-bold uppercase tracking-wider">E-Mail <span class="text-red-600">*</span></label>
                <input type="email" id="email" name="email" required
                       class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
              </div>

              <div class="flex flex-col gap-1">
                <label for="eventDate" class="text-xs font-bold uppercase tracking-wider">Datum des Anlasses <span class="text-red-600">*</span></label>
                <input type="date" id="eventDate" name="eventDate" required
                       class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
              </div>

              <div class="flex flex-col gap-1">
                <label for="eventLocation" class="text-xs font-bold uppercase tracking-wider">Ort / Adresse <span class="text-red-600">*</span></label>
                <input type="text" id="eventLocation" name="eventLocation" required
                       class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
              </div>

            </div>

            <!-- Pill segmented control: real radios, styled via peer/peer-checked -->
            <fieldset class="space-y-2">
              <legend class="text-xs font-bold uppercase tracking-wider">Art des Anlasses <span class="text-red-600">*</span></legend>
              <div class="flex gap-3 mt-2">
                <label>
                  <input type="radio" name="eventType" value="public" class="sr-only peer" required>
                  <span class="block px-5 py-2 rounded-full border border-black text-sm font-medium cursor-pointer select-none
                               transition-colors hover:opacity-80
                               peer-checked:bg-black peer-checked:text-white">öffentlich</span>
                </label>
                <label>
                  <input type="radio" name="eventType" value="private" class="sr-only peer">
                  <span class="block px-5 py-2 rounded-full border border-black text-sm font-medium cursor-pointer select-none
                               transition-colors hover:opacity-80
                               peer-checked:bg-black peer-checked:text-white">privat</span>
                </label>
              </div>
            </fieldset>

            <!-- Ticketing section: revealed by booking.js when eventType = public -->
            <div id="ticketing-section" class="hidden space-y-4">

              <fieldset class="space-y-2">
                <legend class="text-xs font-bold uppercase tracking-wider">Ticketpflichtig? <span class="text-red-600">*</span></legend>
                <div class="flex gap-3 mt-2">
                  <label>
                    <input type="radio" name="ticketed" value="yes" class="sr-only peer">
                    <span class="block px-5 py-2 rounded-full border border-black text-sm font-medium cursor-pointer select-none
                                 transition-colors hover:opacity-80
                                 peer-checked:bg-black peer-checked:text-white">Ja</span>
                  </label>
                  <label>
                    <input type="radio" name="ticketed" value="no" class="sr-only peer">
                    <span class="block px-5 py-2 rounded-full border border-black text-sm font-medium cursor-pointer select-none
                                 transition-colors hover:opacity-80
                                 peer-checked:bg-black peer-checked:text-white">Nein</span>
                  </label>
                </div>
              </fieldset>

              <!-- Ticket URL: revealed by booking.js when ticketed = yes -->
              <div id="ticket-url-section" class="hidden space-y-1">
                <label for="ticketUrl" class="text-xs font-bold uppercase tracking-wider">Ticket-Link <span class="text-red-600">*</span></label>
                <input type="url" id="ticketUrl" name="ticketUrl"
                       placeholder="https://..."
                       class="w-full border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
              </div>

            </div>

            <div class="flex flex-col gap-1">
              <label for="organizerWebsite" class="text-xs font-bold uppercase tracking-wider">
                Website der Organisation
                <span class="text-xs text-gray-400 font-normal normal-case">(optional)</span>
              </label>
              <input type="url" id="organizerWebsite" name="organizerWebsite"
                     placeholder="https://..."
                     class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600">
            </div>

            <div class="flex flex-col gap-1">
              <label for="message" class="text-xs font-bold uppercase tracking-wider">
                Nachricht
                <span class="text-xs text-gray-400 font-normal normal-case">(optional)</span>
              </label>
              <textarea id="message" name="message" rows="4"
                        class="border border-black px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-600 resize-y"></textarea>
            </div>

            <div class="flex justify-end">
              <button type="submit"
                      class="bg-red-600 text-white font-bold px-10 py-3 rounded-full hover:bg-red-700 transition-colors">
                Anfrage senden
              </button>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="border-t border-black px-8 py-5 text-xs">
    <div class="flex justify-center gap-6">
      <a href="impressum.html" class="hover:text-red-600">Impressum</a>
      <a href="datenschutz.html" class="hover:text-red-600">Datenschutz</a>
    </div>

    <!-- Instagram — centered below links, mobile only (sidebar handles desktop) -->
    <div class="flex justify-center mt-4 lg:hidden">
      <a href="https://www.instagram.com/brassaerie"
         target="_blank"
         rel="noopener noreferrer"
         class="text-red-600 hover:text-red-700 transition-colors"
         aria-label="B:RASSäRIE auf Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round"
             class="w-7 h-7" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/gigs.js"></script>
  <script src="js/booking.js"></script>

</body>
</html>
